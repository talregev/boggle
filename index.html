<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light only">
<title>Boggle!</title>
<link rel="stylesheet" href="game.css">

<script type="text/javascript">

function set_board_size()
{
 var bs = document.getElementById('boardsize');
 if(bs)
 {
  dimension = parseInt(bs.value);
  board = new Array();
  board.length = dimension*dimension;
  sync_layout_vars();
 }
}

function open_new_window(URL)
{
   NewWindow = window.open(URL,"_blank","toolbar=no,menubar=0,status=0,copyhistory=0,scrollbars=yes,resizable=1,location=0,Width=800,Height=600");
   NewWindow.location = URL;
}

function set_board_color(color)
{
 var gametable = document.getElementById('gametable');
 if(gametable)
  gametable.style.setProperty('--board-color', color);
}

function format_time(ms)
{
 var totalSeconds = Math.max(0, Math.ceil(ms/1000));
 var minutes = Math.floor(totalSeconds/60);
 var seconds = totalSeconds % 60;
 return minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
}

function update_timer_display()
{
 var timer = document.getElementById('timeremaining');
 if(timer)
 {
  timer.innerHTML = format_time(timeremaining);
 }
}

function rebuild_timer_bar()
{
 var bar = document.getElementById('bar_segments');
 if(!bar) return;
 var totalSeconds = Math.max(1, Math.ceil(totaltime/1000));
 if(bar.childElementCount !== totalSeconds)
 {
  var s = '';
  for(var i=0; i<totalSeconds; i++)
  {
   s += '<div class="bar-segment is-active"></div>';
  }
  bar.innerHTML = s;
  bar.style.setProperty('--bar-segments', totalSeconds);
 }
 update_timer_bar_segments();
}

function update_timer_bar_segments()
{
 var bar = document.getElementById('bar_segments');
 if(!bar) return;
 var remainingSeconds = Math.max(0, Math.ceil(timeremaining/1000));
 var segments = bar.children;
 for(var i=0; i<segments.length; i++)
 {
  if(i < remainingSeconds) segments[i].className = 'bar-segment is-active';
  else                     segments[i].className = 'bar-segment';
 }
}

function play_finished_sound()
{
 if(!finishedsound)
 {
  set_board_color("#FFAA00");
  return;
 }
 set_board_color("#FFAA00");
 finishedsound.currentTime = 0;
 var playpromise = finishedsound.play();
 if(playpromise && typeof playpromise.catch === 'function')
 {
  playpromise.catch(function() {
   set_board_color("#FFAA00");
  });
 }
}

function warm_finished_sound()
{
 if(!finishedsound) return;
 finishedsound.load();
}

function sync_layout_vars()
{
 document.documentElement.style.setProperty('--board-dimension', dimension);
 var page = document.getElementById('page');
 var content = document.getElementById('content');
 var boardPanel = document.getElementById('board_panel');
 var timetable = document.getElementById('timetable');
 var sidePanel = document.getElementById('side_panel');
 var title = document.getElementById('title');
 if(page)
 {
  var rootStyles = getComputedStyle(document.documentElement);
  var rootFontSize = parseFloat(rootStyles.fontSize) || 16;
  var boardMaxRem = parseFloat(rootStyles.getPropertyValue('--board-max-rem')) || 44;
  var boardMax = boardMaxRem * rootFontSize;
  var pageStyles = getComputedStyle(page);
  var viewportWidth = document.documentElement.clientWidth || 0;
  var rectViewportWidth = document.documentElement.getBoundingClientRect().width || 0;
  var isMobileLayout = window.matchMedia('(max-width: 640px)').matches;
  if(window.visualViewport && window.visualViewport.width)
  {
   var visualWidth = window.visualViewport.width;
   var visualScale = window.visualViewport.scale || 1;
   viewportWidth = Math.min(viewportWidth || visualWidth, visualWidth, visualWidth / visualScale);
  }
  if(rectViewportWidth)
  {
   viewportWidth = Math.min(viewportWidth || rectViewportWidth, rectViewportWidth);
  }
  var availableWidth = Math.min(page.clientWidth || viewportWidth, viewportWidth || page.clientWidth);
  availableWidth -= (parseFloat(pageStyles.paddingLeft) || 0) + (parseFloat(pageStyles.paddingRight) || 0);
  if(!isMobileLayout && sidePanel && content)
  {
   var contentStyles = getComputedStyle(content);
   var sideReserve = sidePanel.offsetWidth + (parseFloat(contentStyles.columnGap || contentStyles.gap) || 0);
   availableWidth -= sideReserve * 2;
  }
  var availableHeight = (window.innerHeight || document.documentElement.clientHeight || 0);
  if(boardPanel)
  {
   var panelStyles = getComputedStyle(boardPanel);
   availableWidth -= (parseFloat(panelStyles.paddingLeft) || 0) + (parseFloat(panelStyles.paddingRight) || 0);
   availableHeight -= (parseFloat(panelStyles.paddingTop) || 0) + (parseFloat(panelStyles.paddingBottom) || 0);
  }
  var bodyStyles = getComputedStyle(document.body);
  availableHeight -= (parseFloat(bodyStyles.paddingTop) || 0) + (parseFloat(bodyStyles.paddingBottom) || 0);
  if(title)
  {
   var titleStyles = getComputedStyle(title);
   availableHeight -= title.offsetHeight;
   availableHeight -= (parseFloat(titleStyles.marginTop) || 0) + (parseFloat(titleStyles.marginBottom) || 0);
  }
  if(timetable)
  {
   var timetableStyles = getComputedStyle(timetable);
   availableHeight -= timetable.offsetHeight;
   availableHeight -= (parseFloat(timetableStyles.marginTop) || 0) + (parseFloat(timetableStyles.marginBottom) || 0);
  }
  if(isMobileLayout && sidePanel)
  {
   var sideStyles = getComputedStyle(sidePanel);
   availableHeight -= sidePanel.offsetHeight;
   availableHeight -= (parseFloat(sideStyles.marginTop) || 0) + (parseFloat(sideStyles.marginBottom) || 0);
   if(content)
   {
    var mobileGap = parseFloat(getComputedStyle(content).rowGap || getComputedStyle(content).gap) || 0;
    availableHeight -= mobileGap;
   }
  }
  availableHeight -= 24;
  var nextBoardSize = Math.max(160, Math.min(boardMax, Math.floor(availableWidth), Math.floor(availableHeight)));
  document.documentElement.style.setProperty('--board-size', nextBoardSize + 'px');
 }
 if(timetable)
 {
  bar_width = timetable.clientWidth || bar_width;
 }
}

function maketable(firsttime)
{
 var s = '<div id="gametable">';
 var i, j;
 for(i=0; i<dimension; i++)
 {
  for(j=0; j<dimension; j++)
  {
   s = s+'<div class="board-cell" id="'+i+'_'+j+'">*</div>';
  }
 }
 s = s+'</div>';
 if(firsttime)
 {
  document.writeln(s);
 } else {
  document.getElementById('board_div').innerHTML = s;
 }
 sync_layout_vars();
}

function updatetable()
{
 var i, j;
 for(i=0; i<dimension; i++)  // here? 2
 {
  for(j=0; j<dimension; j++)
  {
   var c = board[i+j*dimension].toUpperCase();
   if(c=='Q') c = 'Qu';
   document.getElementById(i+'_'+j).innerHTML = c;
  }
 }
}

function rolldice()
{
 var i, j, k;
 if(dimension==5)
 {
  rolldice5();
  return;
 }
 var remaining = new Array();
 for(i=0; i<dimension*dimension; i++)
 {
  j = Math.floor(Math.random()*dice.length);
  var die = dice[j];
  j = Math.floor(Math.random()*6);
  var c = die.charAt(j);
  board[i] = c;
 }
}

function rolldice5()
{
 var i, j, k;
 var remaining = new Array();
 for(i=0; i<25; i++)
  remaining.push(i);
 var order = new Array();
 for(i=0; i<25; i++)
 {
  j = Math.floor(Math.random()*remaining.length);
  k = remaining.splice(j, 1);
  var die = dice[k];
  j = Math.floor(Math.random()*6);
  var c = die.charAt(j);
  board[i] = c;
 }
}

function defineboard()
{
 var b = document.getElementById('boarddef').value.toLowerCase();
 if(b.length==dimension*dimension)
 {
  var i, j, k=0;
  for(i=0; i<dimension; i++)
  {
   for(j=0; j<dimension; j++)
   {
    board[i+j*dimension] = b.charAt(k);
    k += 1;
   }
  }
  maketable(false);
  updatetable();
  if(timeremaining>0)
   clearTimeout(timervar);
  timeremaining = 0;
  set_board_color("#00FF00");
  showsolution();
 }
}

function newgame()
{
 rolldice();
 maketable(false);
 updatetable();
 var tt = document.getElementById('totaltime');
 if(tt)
 {
  totaltime = parseInt(tt.value)*1000;
 }
 var sol = document.getElementById('solution');
 if(sol) sol.innerHTML = '';
 if(timeremaining>0)
  clearTimeout(timervar);
 timeremaining = totaltime;
 if(finishedsound)
 {
  finishedsound.pause();
 finishedsound.currentTime = 0;
 }
 warm_finished_sound();
 timervar = setTimeout("tick()", updatefrequency);
 set_board_color("#1d4675");
 update_timer_display();
 rebuild_timer_bar();
}

function newseededgame()
{
 seedstr = document.getElementById('seeddef').value;
 Math.seedrandom(seedstr);
 newgame();
}

function tick()
{
 sync_layout_vars();
 timeremaining = timeremaining-updatefrequency;
 if(timeremaining<=0)
 {
  timeremaining = 0;
  play_finished_sound();
 } else
 {
  timervar = setTimeout('tick()', updatefrequency);
  }
  update_timer_display();
  update_timer_bar_segments();
}

function transform_word(word)
{
 var w = word.toUpperCase();
 return w.replace(/Q/g, 'Qu');
}

function showsolution()
{
 solve();
 var s = '<table width="100%">'
 var col = 0;
 var bgcolor = 0;
 var bgcolstr = "$aaaaff";
 for(var wl=25; wl>=3; wl--)
 {
  var numsolsatthiswl = 0;
  for(var i=0; i<solutions.length; i++)
  {
   if(solutions[i].length==wl)
   {
    var w = transform_word(solutions[i]);
    if(col==0)
     s += '<tr>'
    col = (col+1)%numsolutioncols;
    s += '<td style="background-color:'+bgcolstr+';">';
    //s += '<a class="nodec" href="http://www.lexic.us/definition-of/'+w+'" target="_blank">';
    s += '<a class="nodec" href="#" onClick="open_new_window('
    s += "'http://www.lexic.us/definition-of/"+w+"');"+'">';
    s += w;
    s += '</a></td>';
    if(col==0)
     s += '</tr>\n';
    numsolsatthiswl += 1;
   }
  }
  if(numsolsatthiswl>0)
  {
    bgcolor = (bgcolor+1)%2;
    if(bgcolor==0) bgcolstr="#aaaaff";
    else           bgcolstr="#8888cc";
  }
 }
 if(col>0)
  s += '</tr>';
 s += '</table>';
 document.getElementById('solution').innerHTML = s;
}

function solve()
{
 var minlength = parseInt(document.getElementById('minlength').value);
 solutions = new Array();
 for(var i=0; i<words.length; i++)
 {
  if(words[i].length>=minlength)
  {
   if(findword(words[i]))
   {
    solutions.push(words[i]);
   }
  }
 }
 updatetable();
}

function findword(word)
{
 if(word.length==0) return 0;
 var i, j;
 for(i=0; i<dimension; i++)
 {
  for(j=0; j<dimension; j++)
  {
   if(board[i+j*dimension]==word.charAt(0))
   {
    if(findsequence(word, i, j)) return 1;
   }
  }
 }
 return 0;
}

function safeboard(i, j)
{
 if((i<0) || (j<0) || (i>=dimension) || (j>=dimension)) return '*';
 return board[i+j*dimension];
}

function findsequence(seq, i, j)
{
 if(seq.length<=1) return 1;
 var s;
 s = board[i+j*dimension];
 board[i+j*dimension] = ' ';
 for(var u=-1; u<=1; u=u+1)
 {
  for(var v=-1; v<=1; v=v+1)
  {
   if(safeboard(i+u, j+v)==seq.charAt(1))
   {
    if(findsequence(seq.substr(1), i+u, j+v))
    {
     board[i+j*dimension] = s;
     return 1;
    }
   }
  }
 }
 board[i+j*dimension] = s;
 return 0;
}

board = new Array();
board.length = dimension*dimension;
window.addEventListener('resize', sync_layout_vars);
window.addEventListener('load', function() {
 sync_layout_vars();
 timeremaining = totaltime;
 update_timer_display();
 rebuild_timer_bar();
});
sync_layout_vars();
